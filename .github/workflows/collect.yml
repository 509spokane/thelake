name: Collect weather data

on:
  schedule:
    # Run every hour. Script decides what to do based on Pacific time.
    - cron: '5 * * * *'
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run collector
        run: node scripts/collect.mjs

      - name: Commit and push if data changed
        run: |
          git config user.name "weather-bot"
          git config user.email "bot@thelake.local"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: $(date -u +'%Y-%m-%d %H:%MZ')"
            git push
          fi
